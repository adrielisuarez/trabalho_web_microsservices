<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Nome e Cargo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 420px; background: white; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        form { display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 14px; color: #555; }
        input, select { padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; font-size: 15px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Finalizar Cadastro</h2>
        <p>Informe seu nome e escolha o cargo.</p>
        <form id="registerForm">
            <label for="name">Nome:</label>
            <input type="text" id="name" name="name" required placeholder="Seu nome">

            <label for="role">Cargo:</label>
            <select id="role" name="role">
                <option value="ROLE_CUSTOMER">ROLE_CUSTOMER</option>
                <option value="ROLE_ADMINISTRATOR">ROLE_ADMINISTRATOR</option>
            </select>

            <button type="submit">Salvar e ir para Dashboard</button>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const role = document.getElementById('role').value;
            const token = sessionStorage.getItem('token');
            if (!token) {
                alert('Token não encontrado. Faça o login novamente.');
                window.location.href = '/';
                return;
            }

            try {
                const resp = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ name, role })
                });
                if (resp.ok) {
                    window.location.href = '/dashboard';
                } else {
                    const txt = await resp.text();
                    alert('Erro: ' + txt);
                }
            } catch (err) {
                alert('Erro na requisição: ' + err.message);
            }
        });
    </script>
</body>
</html>
