<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validar Código</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 360px; background: white; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        form { display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 14px; color: #555; }
        input[type="text"] { padding: 10px; font-size: 20px; letter-spacing: 6px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; font-size: 15px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #1e7e34; }
        .email-info { font-size: 13px; color: #777; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Insira o Código Recebido</h2>
        <p class="email-info">Verifique sua caixa de entrada no e-mail: <strong id="emailDisplay"></strong></p>

        <form action="/verify-code" method="POST">
            <!-- Campo oculto para repassar o e-mail -->
            <input type="hidden" id="email" name="email">

            <label for="code">Código de 6 dígitos:</label>
            <input type="text" id="code" name="code" required placeholder="000000" maxlength="6" pattern="\d{6}">

            <button type="submit">Validar Acesso</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        document.getElementById('email').value = email;
        document.getElementById('emailDisplay').textContent = email;
    </script>
</body>
</html>
