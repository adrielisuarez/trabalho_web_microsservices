<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Acesso</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 360px; background: white; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        form { display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 14px; color: #555; }
        input { padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; font-size: 15px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Solicitação de Acesso</h2>
        <p>Insira seu e-mail para receber o código de validação.</p>
        <form action="/send-code" method="POST">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">
            <button type="submit">Enviar Código</button>
        </form>
    </div>
</body>
</html>
