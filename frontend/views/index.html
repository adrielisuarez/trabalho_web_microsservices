<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Acesso</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { display: flex; flex-direction: column; max-width: 300px; gap: 10px; }
        input, button { padding: 8px; font-size: 16px; }
        button { cursor: pointer; background-color: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h2>Solicitação de Acesso</h2>
    <p>Insira seu e-mail para receber o código de validação.</p>
    
    <form action="/send-code" method="POST">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required placeholder="Digite seu e-mail">
        
        <button type="submit">Enviar Código</button>
    </form>
</body>
</html>
